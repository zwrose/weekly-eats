<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weekly Eats — Pantry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f0eee9; }
  body { font-family:'Outfit', system-ui, sans-serif; }
  .ms { font-family:'Material Symbols Outlined'; font-weight:400; font-style:normal; line-height:1; letter-spacing:normal; text-transform:none; display:inline-block; white-space:nowrap; word-wrap:normal; direction:ltr; -webkit-font-smoothing:antialiased; user-select:none; }
  .notes { width:100%; height:100%; overflow:hidden; background:#fef4a8; color:#5a4a2a; font-family:-apple-system, system-ui, sans-serif; padding:24px 26px; line-height:1.5; font-size:14px; box-sizing:border-box; }
  .notes h3 { font-family:'Bricolage Grotesque', system-ui, sans-serif; margin:0 0 12px; font-size:17px; font-weight:700; color:#3d2f15; }
  .notes h4 { margin:14px 0 4px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#6b5826; }
  .notes ul { margin:4px 0 0; padding-left:18px; }
  .notes li { margin-bottom:4px; }
  .notes p { margin:0 0 8px; }
  .notes code { font-family:ui-monospace, monospace; font-size:12px; background:rgba(0,0,0,0.06); padding:1px 5px; border-radius:3px; }
  .notes b { color:#3d2f15; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="nav-chrome.jsx?v=1779761165564"></script>
<script type="text/babel" src="artboards-pantry.jsx?v=1779761165564"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { MobileList, MobileAdd, MobileDelete, DesktopList, DesktopAdd, DesktopDelete } = window;
  const M = { w: 390, h: 844 };
  const D = { w: 1440, h: 900 };
  const N = { w: 450, h: 844 };

  function Notes({ children }) { return <div className="notes">{children}</div>; }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="m-pantry" title="Mobile · pantry"
          subtitle="Faithful re-theme. Same surfaces as main.">
          <DCArtboard id="m-list"   label="List"            width={M.w} height={M.h} style={{ background:'#0f1115' }}><MobileList /></DCArtboard>
          <DCArtboard id="m-add"    label="Add dialog"      width={M.w} height={M.h} style={{ background:'#0f1115' }}><MobileAdd /></DCArtboard>
          <DCArtboard id="m-delete" label="Remove confirm"  width={M.w} height={M.h} style={{ background:'#0f1115' }}><MobileDelete /></DCArtboard>
          <DCArtboard id="m-notes"  label="Notes"           width={N.w} height={M.h}>
            <Notes>
              <h3>Mobile · what changed</h3>
              <ul>
                <li><b>Re-theme only.</b> Same surfaces as today: list, add dialog, remove confirm.</li>
                <li><b>List</b> — single grouped card with hairline-divided rows replaces the per-row elevated Paper cards in main. ✕ on the right, full-row tap reserved for future bulk-select.</li>
                <li><b>Add</b> — full-screen dialog (per <code>responsiveDialogStyle</code>). <code>FoodItemAutocomplete</code> reflowed with our search input + result rows. "Already in pantry" hint preserved.</li>
                <li><b>Remove</b> — bottom sheet instead of centered modal. Same copy as today.</li>
              </ul>
              <h4>Section accent</h4>
              <p>Lavender (<code>#c79bff</code>) per <code>section.pantry</code> in the design system.</p>
            </Notes>
          </DCArtboard>
        </DCSection>

        <DCSection id="d-pantry" title="Desktop · pantry"
          subtitle="Same surfaces, reflowed.">
          <DCArtboard id="d-list" label="List"       width={D.w} height={D.h} style={{ background:'#0f1115' }}><DesktopList /></DCArtboard>
          <DCArtboard id="d-add"  label="Add dialog" width={D.w} height={D.h} style={{ background:'#0f1115' }}><DesktopAdd /></DCArtboard>
          <DCArtboard id="d-delete" label="Delete confirm" width={D.w} height={D.h} style={{ background:'#0f1115' }}><DesktopDelete /></DCArtboard>
          <DCArtboard id="d-notes" label="Notes"     width={N.w} height={D.h}>
            <Notes>
              <h3>Desktop · what changed</h3>
              <ul>
                <li><b>List</b> — table re-themed. Two columns (Food item / Remove), same as main. Centered on the page at ~900px since the content is narrow.</li>
                <li><b>Add</b> — same 460px dialog as today, retyped in the token system.</li>
                <li><b>Remove confirm</b> not shown on desktop — same centered dialog pattern, just smaller copy.</li>
              </ul>
            </Notes>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
