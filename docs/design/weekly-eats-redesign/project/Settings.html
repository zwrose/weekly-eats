<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weekly Eats — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f0eee9; }
  body { font-family:'Outfit', system-ui, sans-serif; }
  .ms { font-family:'Material Symbols Outlined'; font-weight:400; font-style:normal; line-height:1; letter-spacing:normal; text-transform:none; display:inline-block; white-space:nowrap; word-wrap:normal; direction:ltr; -webkit-font-smoothing:antialiased; user-select:none; }
  .notes { width:100%; height:100%; overflow:hidden; background:#fef4a8; color:#5a4a2a; font-family:-apple-system, system-ui, sans-serif; padding:24px 26px; line-height:1.5; font-size:14px; box-sizing:border-box; }
  .notes h3 { font-family:'Bricolage Grotesque', system-ui, sans-serif; margin:0 0 12px; font-size:17px; font-weight:700; color:#3d2f15; }
  .notes h4 { margin:14px 0 4px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#6b5826; }
  .notes ul { margin:4px 0 0; padding-left:18px; }
  .notes li { margin-bottom:4px; }
  .notes p { margin:0 0 8px; }
  .notes code { font-family:ui-monospace, monospace; font-size:12px; background:rgba(0,0,0,0.06); padding:1px 5px; border-radius:3px; }
  .notes b { color:#3d2f15; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="nav-chrome.jsx?v=1779760286474"></script>
<script type="text/babel" src="artboards-settings.jsx?v=1779760286474"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { SettingsMobile, SettingsDesktop } = window;
  const M = { w: 390, h: 844 };
  const D = { w: 1440, h: 900 };
  const N = { w: 450, h: 844 };

  function Notes({ children }) { return <div className="notes">{children}</div>; }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="m-settings" title="Mobile · settings"
          subtitle="One setting: theme.">
          <DCArtboard id="m-settings" label="Settings" width={M.w} height={M.h} style={{ background:'#0f1115' }}><SettingsMobile /></DCArtboard>
          <DCArtboard id="m-notes" label="Notes" width={N.w} height={M.h}>
            <Notes>
              <h3>What's on this page</h3>
              <ul>
                <li><b>Theme</b> — light / dark / system. The only setting we support.</li>
              </ul>

              <h4>Scope decisions</h4>
              <ul>
                <li><b>Default meal-plan owner removed</b> — main shows a conditional dropdown when other users have shared meal plans with you. Not a supported use case, dropped from the redesign.</li>
                <li><b>No save button</b> — selecting a theme applies immediately, same as main's current behavior (the <code>themeChange</code> event fires on change).</li>
                <li><b>No snackbar confirmation</b> — the change is visible in the rest of the chrome (the page itself reflects the new theme), so an extra "Settings saved" toast is noise.</li>
              </ul>

              <h4>Theme cards</h4>
              <p>Each option carries a small preview swatch — page bg, card, text, accent — so the choice is concrete. System shows the diagonal split between light and dark to communicate "follows your device".</p>

              <h4>Where this lives</h4>
              <p>Sub-page under <b>You</b>: bottom-nav <i>You</i> → Settings. Same accent (teal <code>#7dc9d8</code>) and breadcrumb pattern as Food Items.</p>
            </Notes>
          </DCArtboard>
        </DCSection>

        <DCSection id="d-settings" title="Desktop · settings"
          subtitle="Same content, 3-column layout for the theme cards.">
          <DCArtboard id="d-settings" label="Settings" width={D.w} height={D.h} style={{ background:'#0f1115' }}><SettingsDesktop /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
